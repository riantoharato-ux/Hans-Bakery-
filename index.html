<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hans Bakery</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsqrcode/1.0.0/jquery.qrcode.min.js"></script>
</head>
<body>
    <header>
        <h1>Hans Bakery</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#shop">Shop</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="shop">
            <h2>Shop</h2>
            <div class="shopping-cart">
                <h3>Your Cart</h3>
                <div class="cart-items"></div>
                <strong>Total: $<span class="cart-total">0.00</span></strong>
            </div>
            <button id="checkout">Checkout</button>
        </section>
        <section id="notes">
            <h2>Notes</h2>
            <textarea id="notes-input" placeholder="Type your notes here..."></textarea>
        </section>
        <section id="search">
            <h2>Search</h2>
            <input type="text" id="search-input" placeholder="Search for products...">
        </section>
        <section id="qr-code">
            <h2>QR Code</h2>
            <div id="qrcode"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Hans Bakery. All rights reserved.</p>
    </footer>
    <script>
        $(document).ready(function() {
            // Device detection
            if (/Mobi|Android/i.test(navigator.userAgent)) {
                console.log('Mobile Device Detected');
            } else {
                console.log('Desktop Device Detected');
            }

            // Shopping cart with localStorage persistence
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const updateCart = () => {
                $('.cart-items').empty();
                let total = 0;
                cart.forEach(item => {
                    $('.cart-items').append(`<div>${item.name} - $${item.price}</div>`);
                    total += item.price;
                });
                $('.cart-total').text(total.toFixed(2));
                localStorage.setItem('cart', JSON.stringify(cart));
            };

            // Add items to cart (example item)
            $('#checkout').on('click', function() {
                cart.push({name: 'Bakery Item', price: 5.00});
                updateCart();
            });

            // Notes functionality
            $('#notes-input').on('input', function() {
                localStorage.setItem('notes', $(this).val());
            });
            $('#notes-input').val(localStorage.getItem('notes'));

            // Search/filter functionality
            $('#search-input').on('input', function() {
                const value = $(this).val().toLowerCase();
                // Implement filtering logic here
            });

            // QR Code Generation
            $('#qrcode').qrcode({
                text: 'https://hansbakery.com',
                width: 128,
                height: 128
            });
        });
    </script>
</body>
</html>
