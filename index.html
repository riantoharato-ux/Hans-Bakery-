<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hans Bakery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Hans Bakery</h1>
    </header>
    <main>
        <section>
            <h2>Our Products</h2>
            <div id="product-list">
                <!-- Products will be dynamically added here -->
            </div>
        </section>
        <section>
            <h2>Order Form</h2>
            <form id="order-form">
                <label for="product">Select Product:</label>
                <select id="product" required>
                    <!-- Product options will be populated here -->
                </select>
                <label for="quantity">Quantity (max 9999):</label>
                <input type="number" id="quantity" min="1" max="9999" required>
                <button type="submit">Order</button>
            </form>
            <div id="error-message" class="hidden"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Hans Bakery. All rights reserved.</p>
    </footer>
    <script>
        // Sample product data
        const products = [
            { id: 1, name: 'Croissant', price: 2.50 },
            { id: 2, name: 'Baguette', price: 3.00 },
            { id: 3, name: 'Eclair', price: 4.00 }
        ];

        const productList = document.getElementById('product-list');
        const productSelect = document.getElementById('product');
        const quantityInput = document.getElementById('quantity');
        const orderForm = document.getElementById('order-form');
        const errorMessage = document.getElementById('error-message');

        // Populate product dropdown
        function populateProducts() {
            products.forEach(product => {
                const option = document.createElement('option');
                option.value = product.id;
                option.textContent = `${product.name} - $${product.price.toFixed(2)}`;
                productSelect.appendChild(option);
            });
        }

        // Validate quantity
        function validateQuantity(quantity) {
            if (quantity < 1 || quantity > 9999) {
                throw new Error('Quantity must be between 1 and 9999.');
            }
        }

        // Handle form submission
        orderForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const selectedProduct = products.find(p => p.id == productSelect.value);
            const quantity = parseInt(quantityInput.value);
            try {
                validateQuantity(quantity);
                // Store order in localStorage
                const order = { product: selectedProduct, quantity };
                localStorage.setItem('lastOrder', JSON.stringify(order));
                alert(`Order placed: ${quantity} x ${selectedProduct.name}`);
                errorMessage.classList.add('hidden');
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.classList.remove('hidden');
            }
        });

        // Initialize the app
        document.addEventListener('DOMContentLoaded', () => {
            populateProducts();
            // Load last order if exists
            const lastOrder = JSON.parse(localStorage.getItem('lastOrder'));
            if (lastOrder) {
                alert(`Welcome back! Your last order was: ${lastOrder.quantity} x ${lastOrder.product.name}`);
            }
        });
    </script>
</body>
</html>
